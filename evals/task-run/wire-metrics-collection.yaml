id: wire-metrics-collection
task: |
  Wire the existing MetricsCollector into the dogfood/eval run completion path.

  Constraints (read carefully):
  1. Do NOT modify the core engine loop (engine.rs resolve/execute/verify functions).
  2. Do NOT add any subjective quality scoring, rating, or judgement into the metrics.
  3. Data collection only: token counts, durations, cache hit ratios per operation type.
  4. If subjective analysis is needed later, the raw data should be fed to an agent — do NOT hardcode analysis logic.

  What to do:

  1. Read the existing code:
     - src/metrics.rs (MetricsCollector, MetricsSnapshot, MetricsFormatter)
     - src/cli.rs run_dogfood_run_async and run_eval_* functions
     - src/task_run/types.rs (AgentRunRecord with usage data)
     - src/lib.rs (current exports)

  2. In run_dogfood_run_async (cli.rs), AFTER the engine run completes:
     - Collect all AgentRunRecord usage data from the engine report
     - Record each agent run's: operation type, input_tokens, output_tokens, 
       cache_read_tokens, duration_ms, and whether it passed
     - Store this in the MetricsCollector
     - At the end, call collector.snapshot() and if --json was requested,
       include the metrics data alongside the existing output

  3. Keep the data collection PURELY STATISTICAL:
     - DO count: tokens per operation type, durations, cache ratios
     - DO NOT: score, rate, judge, or analyze quality
     - The judge already handles quality evaluation — don't duplicate it

  4. The siko metrics command should show:
     - Total agent runs
     - Tokens by operation type (Specify, Plan, Execute, Verify, Combine, Commit)
     - Average/cache hit rates
     - Total duration
     - No subjective analysis

  5. Test: run cargo build, then cargo test.
  6. If anything breaks, fix the tests but do NOT change engine behavior.

  This is purely additive instrumentation — no existing logic changes.
expectation: |
  MetricsCollector wired into the dogfood run path. siko metrics shows token
  statistics by operation type. No engine changes. All tests pass.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - src/cli.rs
    - src/metrics.rs
    - src/lib.rs
  allow_write: true
max_steps: 24
