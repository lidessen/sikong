id: product-vision
task: |
  The project has a development theory (design/development-theory.md)
  that addresses HOW to improve systematically. But it does not address
  WHERE to go — the vision, the direction, the ultimate goal.

  A development theory without a direction is like a revolutionary army
  with excellent discipline but no strategy. It avoids mistakes but
  doesn't know where to march.

  Read the following:
  - design/development-philosophy.md (the core design philosophy)
  - design/development-theory.md (the current theory, which is missing direction)
  - design/governance-model.md (authority boundaries)
  - design/recursive-agent-engine.md (what the engine does)
  - design/cli-architecture.md (the external surface)
  - design/eval-framework.md (how we measure)
  - The current state of the project (src/, packages/, design/)

  Then produce ONE document: design/product-vision.md

  This document must answer:

  1. What is Sikong's north star? A single sentence that describes
     the ultimate goal. This is not a feature list — it's a direction.
     Example: "Make every software project self-improving through a
     recursive agent engine with typed governance boundaries."

  2. What is the strategic territory? Not what Sikong IS today, but
     what space it claims. What problem does it solve that no other
     tool solves? Where is it going that Claude Code, Codex, Cursor,
     and other AI coding tools are NOT going?

  3. What are the 3-5 strategic milestones? Concrete, recognizable
     states that the project will pass through on the way to the
     north star. Each milestone should be a "what is true when we
     reach this point" statement.

  4. What is explicitly NOT the goal? What will Sikong NOT try to
     be? What features will it NOT build? Knowing what to say "no"
     to is as important as knowing the direction.

  5. How does the direction inform daily iteration decisions?
     When an agent run asks "what should I improve next?", how
     does the direction help answer that? Connect this to the
     development dimensions from the theory document.

  Constraints:
  - No source code changes. Only write the design document.
  - Be concrete. Avoid vague statements like "be the best" or
    "maximize developer productivity."
  - The direction must be grounded in what the system already does
    well, not in wishful thinking.
  - The document should be 500-2000 words.

  After writing, run cargo build to confirm nothing is broken.
expectation: |
  A product vision document that defines where the project is going.
  Must be concrete, grounded, and actionable. Must connect to the
  existing development theory dimensions. Must include what is NOT
  the goal.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - design/
  allow_write: true
