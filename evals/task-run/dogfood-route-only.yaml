id: dogfood-route-only
task: |
  Analyze the current sikong repository itself in the provided read-only git
  worktree. Identify the highest-leverage engineering improvements for the Rust
  task-run engine, agent-host/agent-loop boundary, live eval workflow, logging,
  and design docs. Produce a prioritized improvement report with concrete file
  or module evidence, tradeoffs, and the first two changes you would make next.
  Do not modify files.
expectation: |
  Route-only mode should stop after the root route decision. For this broad
  repository analysis, the engine should run Specify and Plan only. The final
  status must be Planned with child nodes. Each child should own a narrowed
  read_scope. No Execute, Combine, or Verify agent runs should appear on child
  nodes.
workspace:
  provider: current-git
  read_scope:
    - src/**/*.rs
    - evals/**/*.yaml
    - packages/agent-host/src/**/*.ts
    - packages/agent-loop/src/**/*.ts
    - design/**/*.md
    - AGENTS.md
