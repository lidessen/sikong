id: three-layer-tweak
task: |
  Review the three-layer architecture that was recently created
  (src/foundation/, src/mechanism/, src/harness/) and make small
  practical simplifications.

  The design should be "down to earth" (design/down-to-earth.md):
  - Simple, not academic
  - Practical, not theoretical
  - Easy to understand, not impressive to read

  Focus on these specific questions:

  1. src/foundation/types.rs — This file has types for config resolution
     (ProviderConfig, resolve_provider, etc.). These are actually config
     types, not general foundation types. Should they move into
     src/foundation/config.rs instead of being a separate file?

  2. The layer names "foundation" / "mechanism" / "harness" — are these
     the most intuitive names? Would simpler names like "base" / "core" /
     "user" or something else be clearer? Consider that someone new to
     the project should understand the structure immediately.

  3. src/harness/cli.rs — This file is still very large (4000+ lines).
     Could some of the eval/dogfood/metrics functions be extracted into
     separate files within harness/ to make it easier to navigate?

  4. src/foundation/workspace/ — This has 6 files (mod.rs, file_system.rs,
     git_cli.rs, git_file_system.rs, memory.rs, workspaces.rs). Is there
     any obvious simplification? (But do NOT merge files just for the
     sake of it — only if there's a clear benefit.)

  5. Cross-layer dependencies — Check that harness never imports from
     mechanism, and mechanism never imports from foundation.
     If there are violations, fix them.

  For each question, make the change ONLY if it clearly improves
  simplicity. When in doubt, keep the current structure. The goal is
  micro-adjustments, not a redesign.

  After any changes, run cargo build and cargo test to verify nothing
  is broken. If a change would break things, don't make it.
expectation: |
  Small, practical improvements to the three-layer structure.
  All tests still pass. Nothing is "worse" after the change.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - src/**/*.rs
    - src/lib.rs
  allow_write: true
max_steps: 32
