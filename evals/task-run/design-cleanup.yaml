id: design-cleanup
task: |
  Clean up the design/ directory. There are 25 .md files with no clear
  organization. Some are outdated (from the old Go/Bun era), some are
  current, some are drafts.

  Your job:

  1. Read design/README.md — the design registry that tracks document
     status per layer.

  2. Read every .md file in design/. For each, determine:
     - Is it about the current Rust mainline, or the old Go/Bun architecture?
     - Is it accurate and useful, or superseded?
     - Does it belong in one of the three architecture layers
       (base/, core/, harness/)?

  3. Organize:
     - Create subdirectories: design/philosophy/, design/engine/,
       design/interface/, design/legacy/
     - Move current documents into the appropriate subdirectory:
       - philosophy/: development-philosophy, development-theory,
         product-vision, practice-theory-unity, down-to-earth, dogfood,
         governance-model, prompt-guidance
       - engine/: recursive-agent-engine, workspace-management,
         eval-framework, evaluation-framework, assistant-agent-loop
       - interface/: cli-architecture, assistant-agent-protocol
       - legacy/: project-shape, coordination-engine, implementation-plan,
         command-surface, cli, daemon-runtime, client-agent,
         client-ui-user-stories, console-ui-generation
     - Update design/README.md to reference the new paths

  4. Do NOT change the content of any document. Only move files and
     update the registry. The documents can be moved — their content
     is not changed.

  5. After moving, verify that any cross-references between documents
     still work (they should — they use relative paths like ../design/).

  6. Run cargo build to confirm nothing is broken (it shouldn't be).

  Keep it simple. Don't rename files, don't edit content, just organize.
expectation: |
  Files moved into organized subdirectories. Registry updated.
  No content changes. Cargo build passes.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - design/
  allow_write: true
max_steps: 24
