id: study-practice-theory
task: |
  Study two short texts that contain the philosophical foundation for
  iterative, evidence-driven development. Then integrate the principles
  into how the dogfood loop operates.

  Step 1 — Read the texts:

  Fetch and read these two texts (public domain, freely available):

  Text A: "On Practice" (实践论) by Mao Zedong, July 1937
  URL: https://www.marxists.org/reference/archive/mao/selected-works/volume-1/mswv1_16.htm

  Text B: "Oppose Book Worship" (反对本本主义) by Mao Zedong, May 1930
  URL: https://www.marxists.org/reference/archive/mao/selected-works/volume-1/mswv1_5.htm

  Read both texts fully. Then read the existing project design documents:
  - design/product-vision.md (especially the 人民史观 section)
  - design/development-philosophy.md (especially "Agent As Intelligent Node")
  - design/development-theory.md (the 5 dimensions and debt budget)
  - design/governance-model.md (the four layers)
  - The current autonomous-iteration scenario (evals/task-run/autonomous-iteration.yaml)

  Step 2 — Synthesize:

  Write a document design/practice-theory-unity.md that:

  1. Identifies the core principles from the texts that are directly
     applicable to Sikong's iterative development process. Specifically:
     - **From "On Practice"**: How knowledge moves from perception to
       rational knowledge to practice and back. This IS the dogfood loop.
       Map each stage of the dogfood loop to the stages of cognition.
     - **From "Oppose Book Worship"**: "No investigation, no right to
       speak." This maps directly to the requirement that every iteration
       starts with investigation (reading the current state), and that
       evidence must precede action.
     - **From the existing design**: The 人民史观 principle (many ordinary
       agents > one super-agent), the governance model (Arch/Plan/Execute/
       Verify), the verification gates (evidence must pass before becoming
       durable state).

  2. For each principle, show a concrete mapping to the dogfood loop:
     - Where in the loop is this principle applied?
     - What would the loop look like WITHOUT this principle? (The failure mode)
     - What does it look like WITH this principle? (The healthy state)

  3. Propose 3 concrete changes to the autonomous-iteration scenario that
     would embody these principles more deeply:
     - Change A: The scenario should require investigation before action
       (no investigation, no right to speak)
     - Change B: The scenario should require evidence at every step
       (practice is the criterion of truth)
     - Change C: The scenario should reward resolutions of contradictions
       (矛盾论 — find the principal contradiction)

  Step 3 — Integrate:

  Update evals/task-run/autonomous-iteration.yaml to incorporate the
  principles. The scenario should tell the agent to:
  - Investigate before deciding what to improve
  - Produce evidence for each claim
  - Identify and resolve contradictions
  - Practice-theory-practice: analyze → implement → verify → record

  Constraints:
  - Only modify autonomous-iteration.yaml and design/practice-theory-unity.md
  - Do NOT modify any source code (src/, packages/)
  - The philosophical principles must be PRACTICAL, not just decorative.
    Each principle must have a concrete behavioral implication.

  After writing, run cargo build to confirm nothing is broken.
expectation: |
  A design document mapping philosophical principles to the dogfood loop,
  plus an improved autonomous-iteration scenario that embodies investigation-
  first, evidence-based, contradiction-resolving iteration.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - design/
    - evals/task-run/
  allow_write: true
max_steps: 48
