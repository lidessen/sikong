id: simplify-fast-execute
task: |
  来自设计审查(development-log/2025-01-design-review.md)的建议：
  FastExecute 应该合并到标准 Execute 路径中，而不是独立的分支。

  当前问题：
  - FastExecute 是一个独立的 NodePlan 变体，有自己的枚举值、serialize、
    display、pattern matching
  - fast_execute() 和 execute() 是两个几乎一样的函数
  - 代码重复，分支逻辑增加认知负担

  简化方案：
  - 删除 NodePlan::FastExecute 变体
  - 把 verify 跳过逻辑放到 execute() 内部：
    当 execute 完成后，判断是否跳过 verify：
    - 如果 size 是 Tiny
    - 且 workspace_change 为空
    → 直接 commit，跳过 verify_and_maybe_commit

  约束：
  - cargo build && cargo test 必须通过
  - 行为不变：Tiny 任务仍然跳过 verify
expectation: |
  FastExecute 合并进标准 Execute 路径，没有独立枚举变体。测试通过。
workspace:
  provider: current-file-system
  read_scope:
    - src/core/task_run/
    - tests/
  write_scope:
    - src/core/task_run/**/*.rs
    - tests/
  allow_write: true
max_steps: 32
