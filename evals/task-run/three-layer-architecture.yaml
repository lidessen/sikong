id: three-layer-architecture
task: |
  Analyze and reorganize the entire Sikong codebase into three clear layers
  grounded in the Practice-Theory Unity methodology (design/practice-theory-unity.md).

  The goal: when new harness-layer methods and theories are introduced (like
  practice-theory unity, 人民史观, new decomposition strategies), they can
  be cleanly added WITHOUT affecting lower layers and WITHOUT interference
  from unrelated concerns.

  == THE THREE LAYERS ==

  L0 — Foundation (基础设施层)
  Atomic, unit-testable, stable, rarely changed. Pure logic.
  - No mocking needed in tests
  - No agent or harness concepts
  - Examples: basic types, workspace providers, resource management,
    protocol definitions, utility functions
  - Test style: pure unit tests, no dependencies on agent loop or engine

  L1 — Mechanisms (机制层)
  Code-level mechanisms that compose Foundation primitives.
  - Tests need some integration setup or mocking
  - Concrete: task board, engine state machine, task store, agent run
    scheduler, governance model enforcement, memo table
  - This is the "kernel" that makes the system work
  - Test style: integration tests with controlled agent runners

  L2 — Harness (编排层)
  Orchestration, prompts, skills, scenario definitions, task processing flows.
  - This is where the Practice-Theory Unity methodology lives
  - Concrete: operation harnesses (Specify/Plan/Execute/Combine/Verify/Commit
    prompts), ACP protocol handlers, assistant session, scenario YAML files,
    dogfood loop configuration, metrics collection
  - When a new theory is integrated (矛盾论, 实践论, etc.), it enters here
    without touching L0 or L1
  - Test style: end-to-end with real or mock agents

  == YOUR TASK ==

  Phase 1 — Analysis (read and assess):
  1. Read ALL source files and categorize each one by layer.
     - src/workspace/* — Foundation or Mechanism?
     - src/task_run/* — which files are Mechanism, which are Harness?
     - src/task_board/* — Mechanism or Harness?
     - src/assistant/* — Harness or Mechanism?
     - src/agent_run/* — Foundation or Mechanism?
     - src/cli.rs — Harness (entry point)?
     - packages/agent-host/* — Harness?
     - packages/agent-loop/* — Harness?
     - src/metrics.rs — Foundation, Mechanism, or Harness?
     - src/config.rs — Foundation or Mechanism?

  2. For each file, write a brief justification. Example:
     - src/task_run/types.rs → L0 Foundation (basic types, no engine concepts)
     - src/task_run/engine.rs → L1 Mechanism (composes types into state machine)
     - src/task_run/harness.rs → L2 Harness (prompts, context projection)

  3. Identify misplaced code: files or functions that belong to a different
     layer than where they currently live. For each, propose a move.

  4. Identify cross-layer dependencies that should be inverted:
     - Does a Foundation file import from a Mechanism file? (bad)
     - Does a Mechanism file import from a Harness file? (bad)
     - Does a Harness file import from a Foundation file? (good — clean)

  Phase 2 — Reorganize (implement):
  5. Create a module structure that reflects the three layers:
     src/
       foundation/   (L0)
       mechanism/    (L1)
       harness/      (L2)

  6. Move files or extract functions into the correct layer.
     - Keep existing pub exports working via re-exports in lib.rs
     - Do NOT change any function signatures or behavior
     - Only reorganize: move files, update mod.rs, update imports

  7. Ensure the dependency direction is always:
     harness → mechanism → foundation
     (Never: foundation imports mechanism, or mechanism imports harness)

  8. After each move, run cargo build. Fix any import errors.
  9. After all moves, run cargo test. Fix any test issues.

  Constraints:
  - Do NOT change function logic, signatures, or behavior
  - Do NOT add new features or fix non-move-related issues
  - Keep all existing pub exports working via re-exports in lib.rs
  - The goal is structural purity, not functional change

  Key principle from practice-theory-unity:
  "Theory serves practice, not the reverse" — the layer structure should make
  it EASIER to introduce new harness theories without touching lower layers.
  If a move makes this harder, don't do it.

expectation: |
  A three-layer module structure with clean dependency direction.
  All tests pass. No behavior changes. New theories can be added at
  the harness layer without affecting lower layers.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - src/**/*.rs
    - src/lib.rs
  allow_write: true
max_steps: 64
