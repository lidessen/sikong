id: cost-efficiency-metrics
task: |
  Design a scientific evaluation framework for measuring the cost and time efficiency
  of Sikong's autonomous self-iteration loop.

  Background:
  - 10 consecutive dogfood runs completed: 26 minutes total, $0.47 total cost
  - 10 autonomous improvements delivered (tests, clippy fixes, cleanup, etc.)
  - 95% cache hit rate on DeepSeek v4 Flash
  - Need a rigorous way to evaluate whether this is efficient, and how to improve

  Your job:

  1. Research: Read the existing codebase to understand how the dogfood loop works:
     - src/cli.rs: run_dogfood_run, run_dogfood_run_async
     - The autonomous-iteration.yaml scenario
     - src/task_run/ (types.rs, engine.rs, harness.rs) for token tracking
     - packages/agent-host/src/agent-loop-worker.ts for usage tracking
     - development-log/2026-06.md for actual cost data

  2. Design a metrics framework that covers:
     - **Token efficiency**: tokens per delivered improvement, token breakdown by operation
     - **Time efficiency**: wall-clock time per operation, bottlenecks (API vs tool execution)
     - **Cost efficiency**: $ per improvement, $ per line of test, $ per bug found
     - **Quality-adjusted efficiency**: not all improvements are equal — weight by impact
     - **Cache effectiveness**: cache hit rate per operation type, optimization opportunities
     - **Comparative baseline**: how does this compare to human effort for the same tasks?

  3. Produce a concrete proposal:
     - Define 3-5 key metrics to track per iteration
     - Define a standardized "performance test" scenario that produces comparable data
     - Implement the tracking mechanism (store metrics in a structured format)
     - Add a command or report format to view the metrics

  4. Implementation:
     - Write a metrics collector module or extend existing code
     - Add a `siko metrics` or `siko report` command to show results
     - Add at least one report format (terminal table or JSON)

  Do NOT modify the core engine logic. Focus on measurement and reporting.

  After implementation, run cargo test to verify everything compiles.
expectation: |
  A working metrics framework that produces structured output about iteration
  efficiency. Must include at least 3 key metrics, a standardized collection
  mechanism, and a CLI command to view results.
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - src/**/*.rs
    - design/
  allow_write: true
