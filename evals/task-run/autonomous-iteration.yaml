id: autonomous-iteration
max_steps: 24
task: |
  看一下 development-log，找到最近的方向，然后往前推进一步。
  改完跑 cargo build && cargo test，然后 git add && git commit。
  记到 development-log 里。
expectation: |
  推进了项目。有代码变更或文档更新。
workspace:
  provider: current-file-system
  read_scope:
    - src/
    - development-log/
  write_scope:
    - src/**
  allow_write: true
