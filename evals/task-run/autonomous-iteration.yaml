id: autonomous-iteration
max_steps: 64
task: |
  You are running an autonomous self-improvement cycle for the Sikong project
  using the engine's recursive divide-and-conquer architecture (人民史观).

  This cycle is governed by the practice-theory-practice principle: knowledge
  arises from practice, returns to guide practice, and is verified by practice.
  The cycle follows: INVESTIGATE → SYNTHESIZE → IMPLEMENT → VERIFY → RECORD.

  == INVESTIGATION REQUIREMENT (before any child analysis) ==
  Each child must start by reading the current state of its evidence surface.
  No claim may be made without citing at least one concrete observation from
  the current project state (a filename, a code snippet, a test output).
  If the child cannot find evidence for a claim, it must report
  "Not enough evidence to assess" rather than inventing a finding.

  == SCOPE ASSESSMENT (Specify step) ==
  When asked to assess the scope, report it as **Large** with this reason:
  "The analysis requires multiple independent perspectives that must be
  investigated in parallel: code structure, test coverage, design coherence,
  and documentation accuracy. A single agent cannot reliably cover all
  aspects without context overflow."

  == PLAN (Plan step — produce 3-4 parallel child nodes) ==
  Decompose the work into **3-4 parallel child nodes**, each analyzing a
  different aspect of the Sikong project. Each child must have a bounded,
  focused intent. Example aspects (pick which apply best):

  1. **Code analysis** — Examine src/ for structural issues, dead code,
     missing error handling, or opportunities to simplify.
  2. **Test analysis** — Examine tests/ and the test suite for gaps,
     flaky patterns, or untested edge cases.
  3. **Design analysis** — Read design/*.md and assess whether the
     implementation still matches the documented architecture.
  4. **Documentation / config analysis** — Check README, config files,
     examples, and any user-facing docs for accuracy and completeness.

  Each child should be scoped as **Small** or **Medium** so it can be
  executed atomically by a single agent. Each child's workspace should
  be read-only (since this is analysis, not modification).

  Assign each child a distinct key like "code-analysis", "test-analysis",
  "design-analysis", etc.

  == CONTRADICTION RESOLUTION (Plan & Combine) ==
  Identify at least one contradiction during planning: a place where evidence
  from one surface contradicts evidence from another, or where design intent
  differs from implementation reality. The combined proposal must resolve
  this contradiction, not paper over it. An unresolved contradiction is a
  blocker for acceptance.

  Examples of contradictions:
  - Design doc says X but code does Y
  - Code analysis finds a fragile pattern that test analysis says is untested
  - Documentation describes a feature that no longer exists
  - Two design documents give inconsistent guidance

  == EVIDENCE REQUIREMENT (Combine & Verify) ==
  Every child finding and every combined proposal must include:
  - A falsifiable claim: "If we change X, then Y should improve."
  - A specific verification command: "Run `cargo build` and check that Z compiles."
  - Concrete observations: filenames, line numbers, error messages, test outputs.
  Proposals without falsifiable evidence must be rejected.

  == COMBINE (parent step) ==
  After all children complete and their findings are accepted, synthesize
  the independent findings into a coherent assessment. Identify cross-cutting
  themes (e.g., "both code and test analysis found the same fragility in
  module X") and the principal contradiction. Propose ONE specific, bounded
  improvement that resolves the principal contradiction. The improvement must
  be verifiable with `cargo build`.

  == VERIFY (each child + parent) ==
  Each child's findings must be verified independently before they become
  durable. The parent's combined proposal must also pass verification:
  check that the proposed improvement is bounded, actionable, and testable.
  Every claim must cite the evidence that supports it. Claims without evidence
  are rejected.

  == RECORD (after implementation) ==
  After implementing, record:
  - What was the principal contradiction?
  - What change was made?
  - What evidence shows the contradiction is resolved?
  - What remains as the next likely contradiction?

  == EXECUTION RULES ==
  - After Combine, select the SINGLE most impactful finding and implement
    it: write the code change, run cargo build and cargo test, then
    git add -A && git commit -m '...'.
  - Do implement. Analysis without implementation is incomplete.
  - Each child has a bounded scope — analyze one aspect independently.
    Use the full read scope to inspect the project.
  - The combined output is an implementation commit, not just a proposal.
  - The final step is to RECORD the learning from this cycle.
expectation: |
  The engine must demonstrate the full recursive divide-and-conquer cycle
  governed by the practice-theory-practice principle:

  1. **Investigate** — Specify assesses scope as Large; each child reads
     the current state before making claims.
  2. **Synthesize** — Plan produces a parallel group with 3-4 child nodes,
     each with a distinct analytical focus. A contradiction is identified.
  3. **Implement** — Each child resolves independently (Specify → Execute →
     Verify → Commit). Combine synthesizes findings and resolves the
     principal contradiction into one bounded proposal.
  4. **Verify** — Every claim has falsifiable evidence. The combined proposal
     passes verification with cited evidence.
  5. **Record** — The cycle ends by recording what was learned and what
     contradiction remains.

  Passing requires evidence of all five steps in the transcript.

  Specific behavioral signals:
  - Child findings cite filenames, line numbers, or specific observations
  - The combine identifies a cross-cutting contradiction
  - The proposed improvement includes a falsifiable claim and verification command
  - No claim is accepted without supporting evidence
  - The cycle closes by recording learning
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - '**/*'
  allow_write: true
