id: autonomous-iteration
max_steps: 64
task: |
  这是 Sikong 自我迭代的一轮。每一轮都是前一轮的延续——前一轮做了什么、学到了什么、还剩什么没做，都在 development-log 里。

  你的工作：
  1. 读 development-log/2026-06.md 和最近的 git log，
     了解当前状态和上一轮做了什么
  2. 决定这一轮做什么能让项目更好。不是"修一个 bug"，
     是"在这一轮结束时，项目比开始的时候好了什么"
  3. 做出来。改代码、加测试、删冗余、改文档——什么都行。
  4. 验证。cargo build && cargo test。
  5. 记下来。在 development-log 里追加这一轮做了什么、
     学到了什么、下一轮可以考虑做什么。

  引擎会自己决定怎么拆、怎么合、怎么验。
  你只需要告诉它：这一轮要往哪个方向走。
expectation: |
  一轮迭代完成：项目比开始时更好了。有代码变更或文档更新，
  验证通过，提交了，记录了。
workspace:
  provider: current-file-system
  read_scope:
    - '**/*'
  write_scope:
    - '**/*'
  allow_write: true
