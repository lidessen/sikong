id: migrate-dogfood-to-run
task: |
  废弃 dogfood 命令，把功能迁移到 send/run 命令上。

  当前状态：
  - dogfood 是一个独立子命令（已隐藏），只能通过 SIKONG_DEV=1 启用
  - dogfood run --scenario <name> 和 dogfood run --scenario-file <path> 执行 eval 场景
  - dogfood list 列出可用场景

  要求：
  1. send/run 命令增加 --scenario 和 --scenario-file 参数
  2. 当指定 --scenario 或 --scenario-file 时，走 direct engine 路径（不走 assistant）
  3. 不传这些参数时，保持现有行为（走 assistant 消息）
  4. dogfood 子命令标记为废弃（deprecated），功能指向 run --scenario
  5. 所有现有 dogfood eval 场景文件（evals/task-run/*.yaml）继续可用
  6. 只改 src/harness/cli.rs

  约束：cargo build && cargo test 必须通过。
expectation: |
  Dogfood 功能迁移到 send/run 完成。
workspace:
  provider: current-file-system
  read_scope:
    - "**/*"
  write_scope:
    - src/harness/cli.rs
  allow_write: true
max_steps: 64
