<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sikong</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0b;
        --surface: #121214;
        --border: rgba(255, 255, 255, 0.08);
        --fg: #e7e7e9;
        --fg-2: #a8a8ad;
        --accent: #f59e0b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Geist,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 13px;
        line-height: 1.45;
      }
      main {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 8px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 18px;
        color: var(--fg-2);
      }
      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      pre {
        margin: 0;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        background: #0d0d0f;
        color: var(--fg);
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sikong beta</h1>
      <p>Install the macOS arm64 CLI, then run the local daemon and web UI.</p>
      <pre><code>curl -fsSL https://sikong.dev/install.sh | sh
sikong start</code></pre>
    </main>
  </body>
</html>
