name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  darwin-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run release:darwin-arm64 "$GITHUB_REF_NAME"
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/release/sikong-darwin-arm64.tar.gz \
            dist/release/sikong-darwin-arm64.tar.gz.sha256 \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
