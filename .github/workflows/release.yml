name: Release

# Tag a version to cut a release:  git tag v0.1.7 && git push origin v0.1.7
# Builds every platform binary, packages them as the assets install.sh expects,
# and publishes a GitHub Release. Curl install then resolves them from
# releases/latest/download/sikong-<platform>.tar.gz.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # arm64 host; bun cross-compiles every target from here
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install
        run: bun install --frozen-lockfile

      - name: Gate (typecheck + test)
        run: |
          bun run typecheck
          bun run test

      - name: Cross-compile all platform binaries
        run: bun run --filter sikong build:platforms

      - name: Package release assets
        run: |
          set -eu
          mkdir -p dist-release
          cd packages/sikong/npm
          for dir in */; do
            key="${dir%/}"
            if [ -f "$key/bin/sikong.exe" ]; then
              ( cd "$key/bin" && zip -q "$GITHUB_WORKSPACE/dist-release/sikong-${key}.zip" sikong.exe )
            elif [ -f "$key/bin/sikong" ]; then
              tar -czf "$GITHUB_WORKSPACE/dist-release/sikong-${key}.tar.gz" -C "$key/bin" sikong
            fi
            echo "packaged $key"
          done
          cp "$GITHUB_WORKSPACE/install.sh" dist-release/install.sh
          ls -la "$GITHUB_WORKSPACE/dist-release"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist-release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
