# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(cd /Users/lidessen/workspaces/crabbro && git log --oneline -20)", "Bash(cd /Users/lidessen/workspaces/crabbro && git log --format=\"%h %ai %s\" -30)", "Bash(cd /Users/lidessen/workspaces/crabbro && for pkg in packages/*/; do echo \"=== $pkg ===\"; ls \"$pkg\" | head -20; echo; done)", "Bash(cd /Users/lidessen/workspaces/crabbro && for pkg in packages/*/; do echo \"=== $pkg src/ ===\"; find \"$pkg/src\" -name '*.ts' 2>/dev/null | sort; echo; done)", "Bash(cd /Users/lidessen/workspaces/crabbro && for pkg in packages/*/; do echo \"=== $pkg test/ ===\"; find \"$pkg/test\" -name '*.ts' 2>/dev/null | sort; echo; done)", "Bash(cd /Users/lidessen/workspaces/crabbro && cat packages/shared/package.json)", "Bash(cd /Users/lidessen/workspaces/crabbro && bun run typecheck 2>&1 | tail -30)", "Bash(cd /Users/lidessen/workspaces/crabbro && bun run test 2>&1 | tail -40)", "explore", "Bash(cd /Users/lidessen/workspaces/sikong && find packages/sikong/test -name '*.ts' | sort)", "Bash(cd /Users/lidessen/workspaces/sikong && find packages/sikong/src -name '*.test.ts' | sort)", "Bash(cd /Users/lidessen/workspaces/sikong && ls design/decisions/ | head -20 && echo \"---\" && ls design/decisions/ | wc -l)", "Bash(cd /Users/lidessen/workspaces/sikong && ls design/areas/)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -n \"multi\\|concurr\\|parallel\\|daemon\\|server\\|background\\|run_all\\|seed\\|scheduler\\|queue\\|priority\" packages/sikong/src/cli.ts | head -30)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -rn \"multi\\|concurr\\|parallel\\|daemon\\|server\\|background\\|run_all\\|queue\\|priority\" packages/sikong/src/engine/ | grep -v test | grep -v \".test.\" | head -30)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -n \"multi.*project\\|multi.*task\\|concurr\\|parallel\\|daemon\\|server\\|backgroun\\|queue\\|priority\\|resource\\|limi\\|throttl\\|schedul\" design/areas/workspace-engine.md | head -30)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -rn \"concurr\\|parallel\\|throttl\\|rate.limi\\|backlog\\|resource.limi\" design/decisions/ | head -20)", "Edit", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test src/workspace.test.ts 2>&1 | grep -E \"cred|pass|fail\")", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test 2>&1 | grep -E \"Test Files|Tests\")", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test 2>&1 | tail -5)", "Bash(cd /Users/lidessen/workspaces/sikong && go build ./cmd/sikong/ 2>&1)", "Bash(cd /Users/lidessen/workspaces/sikong && go build -o /tmp/sikong ./cmd/sikong/ && /tmp/sikong help)", "Bash(cd /Users/lidessen/workspaces/sikong && go test ./... 2>&1)", "Bash(cd /Users/lidessen/workspaces/sikong && go test ./cmd/sikong/ -v 2>&1)", "Bash(cd /Users/lidessen/workspaces/sikong && bun run typecheck 2>&1 | tail -5 && echo \"---\" && go test ./... 2>&1 | tail -5)", "Bash(cd /Users/lidessen/workspaces/sikong && go test ./... 2>&1 | tail -5 && bun run typecheck 2>&1 | tail -5)", "Bash(cd /Users/lidessen/workspaces/sikong && go test ./cmd/sikong/ 2>&1 && go test ./internal/... 2>&1 && bun run typecheck 2>&1 | tail -3)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -n \"workerRole\\|worker.role\" packages/sikong/src/workflow/validate.ts)", "Bash(cd /Users/lidessen/workspaces/sikong && grep -n \"selectArgs\\|selectWorker\\|workerRole\" packages/sikong/src/workspace.ts | head -15)", "Bash(cd /Users/lidessen/workspaces/sikong && bun run --filter sikong typecheck 2>&1 | tail -5)", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test src/worker.test.ts src/workflow/validate.test.ts 2>&1 | tail -5)", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test 2>&1 | grep -E \"pass|fail|Test Files|Tests\")", "Bash(cd /Users/lidessen/workspaces/sikong && grep -n \"Verify stage\" packages/sikong/src/workflow/builtin.ts)", "Bash(cd /Users/lidessen/workspaces/sikong/packages/sikong && bun test src/workflow/validate